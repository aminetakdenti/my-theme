# Onyx Gold Dark - Tmux Theme
# Author: Based on Onyx Gold colorscheme
#
# Palette:
#   bg:      #111111
#   bg1:     #1a1a1a
#   bg2:     #222222
#   bg3:     #2a2a2a
#   bg4:     #333333
#   fg:      #eeeeee
#   fg2:     #999999
#   gold:    #e5b842
#   green:   #4cc580
#   red:     #eb5757

# ── Status bar ────────────────────────────────────────────────
set -g status-style "bg=#1a1a1a,fg=#999999"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 60

# Left: session name in gold
set -g status-left "#[fg=#111111,bg=#e5b842,bold] #S #[fg=#e5b842,bg=#1a1a1a,nobold] "

# Right: date and time
set -g status-right "#[fg=#999999,bg=#1a1a1a] %H:%M #[fg=#eeeeee,bg=#222222] %d-%b-%y "

# ── Window tabs ───────────────────────────────────────────────
# Inactive windows
set -g window-status-format "#[fg=#999999,bg=#1a1a1a] #I:#W "

# Active window: gold background, dark text — clearly distinguishable
set -g window-status-current-format "#[fg=#111111,bg=#e5b842,bold] #I:#W "

set -g window-status-separator ""

# ── Pane borders ──────────────────────────────────────────────
set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#e5b842"

# ── Message / command line ────────────────────────────────────
set -g message-style "fg=#eeeeee,bg=#222222"
set -g message-command-style "fg=#e5b842,bg=#222222"

# ── Copy mode ─────────────────────────────────────────────────
set -g mode-style "fg=#111111,bg=#e5b842"

# ── Clock ─────────────────────────────────────────────────────
set -g clock-mode-colour "#e5b842"

# ── Misc ──────────────────────────────────────────────────────
set -g display-panes-active-colour "#e5b842"
set -g display-panes-colour "#999999"
